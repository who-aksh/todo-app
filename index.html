<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo List</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="todo-app">
    <header>
      <p class="eyebrow">Stay organized</p>
      <h1>My Todo List</h1>
      <p class="subtitle">Add tasks, check them off, and keep moving.</p>
    </header>

    <form id="todo-form" class="todo-form">
      <label for="todo-input" class="sr-only">New task</label>
      <input
        id="todo-input"
        type="text"
        placeholder="What needs to be done?"
        maxlength="120"
        autocomplete="off"
        required
      >
      <button type="submit">Add task</button>
    </form>

    <div class="list-header">
      <h2>Tasks</h2>
      <span id="task-count" aria-live="polite">0 tasks left</span>
    </div>

    <ul id="todo-list" class="todo-list"></ul>
    <p id="empty-state" class="empty-state">No tasks yet. Add one above.</p>
  </main>

  <script src="script.js"></script>
</body>
</html>
